# ── Aplicación ─────────────────────────────────────────
spring.application.name=listaespera
server.port=8080

# ── PostgreSQL ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/lista_espera_db
spring.datasource.username=postgres
spring.datasource.password=brisas123!
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ─────────────────────────────────────────────────
# El secret debe tener al menos 32 caracteres para HMAC-SHA256
jwt.secret=rednorte-super-secret-key-2025-minimo32chars!!
jwt.expiration=86400000

# ── Resilience4j Circuit Breaker ────────────────────────
resilience4j.circuitbreaker.instances.listaEsperaService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.listaEsperaService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.listaEsperaService.waitDurationInOpenState=10s

# ── Logging ─────────────────────────────────────────────
logging.level.cl.duoc.rednorte=DEBUG
logging.level.org.springframework.security=DEBUG